name: Generate Questions

on:
  schedule:
    # 매시간 :17분에 실행 (UTC 기준, 혼잡 시간 회피)
    - cron: '17 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: '실행 모드'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - paper
      paper:
        description: '(paper 모드) 논문 파일 경로 (reading/ 폴더 내)'
        required: false
        type: string
      level:
        description: '레벨 범위 (예: 1-4, 3, 5-7)'
        required: false
        default: ''
        type: string
      count:
        description: '레벨당 문제 수'
        required: false
        default: '2'
        type: string
      topic:
        description: '토픽 (humanities/social/science/tech/arts, 비우면 랜덤)'
        required: false
        default: ''
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # ── 수동: 특정 논문 기반 생성 ──
      - name: Generate (paper mode)
        if: github.event_name == 'workflow_dispatch' && inputs.mode == 'paper' && inputs.paper != ''
        run: |
          ARGS="reading/${{ inputs.paper }}"
          if [ -n "${{ inputs.level }}" ]; then ARGS="$ARGS --level ${{ inputs.level }}"; fi
          if [ -n "${{ inputs.topic }}" ]; then ARGS="$ARGS --topic ${{ inputs.topic }}"; fi
          ARGS="$ARGS --count ${{ inputs.count }}"
          echo "▶ npx tsx scripts/generate-from-paper.ts $ARGS"
          npx tsx scripts/generate-from-paper.ts $ARGS

      # ── 자동: 논문 지식 + 소재 뱅크 기반 생성 ──
      - name: Generate (auto mode)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.mode == 'auto')
        run: |
          ARGS=""
          if [ -n "${{ inputs.level }}" ]; then ARGS="$ARGS --level ${{ inputs.level }}"; fi
          if [ -n "${{ inputs.topic }}" ]; then ARGS="$ARGS --topic ${{ inputs.topic }}"; fi
          ARGS="$ARGS --count ${{ inputs.count || '2' }}"
          echo "▶ npx tsx scripts/generate-auto.ts $ARGS"
          npx tsx scripts/generate-auto.ts $ARGS

      - name: Summary
        if: always()
        run: |
          echo "### 📊 문제 생성 결과" >> $GITHUB_STEP_SUMMARY
          echo "- **시각**: $(TZ=Asia/Seoul date '+%Y-%m-%d %H:%M KST')" >> $GITHUB_STEP_SUMMARY
          echo "- **트리거**: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **모드**: ${{ inputs.mode || 'auto (scheduled)' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **상태**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
