name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      NEXT_PUBLIC_PORTONE_STORE_ID: placeholder-store-id
      NEXT_PUBLIC_PORTONE_CHANNEL_KEY_INICIS: placeholder-channel-key
      NEXT_PUBLIC_PORTONE_CHANNEL_KEY_KAKAOPAY: placeholder-channel-key
      NEXT_PUBLIC_PORTONE_CHANNEL_KEY_KAKAOPAY_ONETIME: placeholder-channel-key
      PORTONE_API_SECRET: placeholder-api-secret
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
